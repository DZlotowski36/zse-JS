<html>
<head>
<title>Złotowski Z41_JS</title>
<meta charset="utf-8">
<style>
h1 { text-transform: uppercase; }
</style>
</head>
<body bgcolor=#7287d6>
<h1>Proste działania</h1>
<h3>Złotowski 3F</h3>
<label for="a">Podaj pierwszą liczbę:</label> <input type="number" id="a">
<br><br>
<label for="b">Podaj drugą liczbę:</label> <input type="number" id="b">
<br><br>
<input type="button" value="DODAWANIE" onclick="suma_zlo()">
<input type="button" value="ODEJMOWANIE" onclick="roznica_zlo()">
<input type="button" value="MNOŻENIE" onclick="iloczyn_zlo()">
<input type="button" value="DZIELENIE" onclick="iloraz_zlo()">
<input type="button" value="TEORIA-Złotowski" onclick="teoria_zlo()">
<div id="wynik.toFixed(2)" style="margin-top:20px;"></div>
<script>
function suma_zlo()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;
if (a == "" || b == "")
{
document.getElementById("wynik.toFixed(2)").innerHTML = "Proszę uzupełnić obie liczby.";
} else
{
a = parseFloat(a);
b = parseFloat(b);
var suma_zlo = a + b;
document.getElementById("wynik.toFixed(2)").innerHTML = "Wynik działania wynosi: " + suma_zlo;
}
//alert(a);
//console.log(a);
}
function roznica_zlo()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;
if (a == "" || b == "")
{
document.getElementById("wynik.toFixed(2)").innerHTML = "Proszę uzupełnić obie liczby.";
} else
{
a = parseFloat(a);
b = parseFloat(b);
var roznica_zlo = a - b;
document.getElementById("wynik.toFixed(2)").innerHTML = "Wynik działania wynosi: " + roznica_zlo;
}
}
function iloczyn_zlo()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;
if (a == "" || b == "")
{
document.getElementById("wynik.toFixed(2)").innerHTML = "Proszę uzupełnić obie liczby.";
} else
{
a = parseFloat(a);
b = parseFloat(b);
var iloczyn_zlo = a * b;
document.getElementById("wynik.toFixed(2)").innerHTML = "Wynik działania wynosi: " + iloczyn_zlo;
}
}
function iloraz_zlo()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;
if (a == "" || b == "")
{
document.getElementById("wynik.toFixed(2)").innerHTML = "Proszę uzupełnić obie liczby.";
} else
{
a = parseFloat(a);
b = parseFloat(b);
if (b == 0)
{
document.getElementById("wynik.toFixed(2)").innerHTML = "Nie wolno dzielić przez zero.";
}
else
{
var iloraz_zlo = a / b;
document.getElementById("wynik.toFixed(2)").innerHTML = "Wynik działania wynosi: " + iloraz_zlo;
}
}
}
function teoria_zlo()
{
document.write("<font color=green size=4>Pierwsza linia kodu:</font><br>");
document.write("<font color=red size=4>&lt;label for=&quot;a&quot;&gt;Podaj pierwszą liczbę:&lt;/label&gt; &lt;input type=&quot;number&quot; id=&quot;a&quot;&gt;</font><br>");
document.write("<font color=green size=4>Wytłumaczenie:</font><br>");
document.write("<font color=red size=4>Ta linijka kodu HTML tworzy interfejs użytkownika składający się z etykiety (label)[opis wprowadzania danych, czyli tekst przed polem input] i pola do wprowadzania danych (input) w języku JavaScript (oraz HTML). label i input współpracują między sobą.</font><br><br>");

document.write("<font color=green size=4>Druga linia kodu:</font><br>");
document.write("<font color=red size=4>&lt;input type=&quot;button&quot; value=&quot;DODAWANIE&quot; onclick=&quot;suma()&quot;&gt;</font><br>");
document.write("<font color=green size=4>Wytłumaczenie:</font><br>");
document.write("<font color=red size=4>Wykonanie przycisku o nazwie DODAWANIE i z takim samym napisem, kliknięcie myszką uruchamia funkcję suma().</font><br><br>");

document.write("<font color=green size=4>Trzecia linia kodu:</font><br>");
document.write("<font color=red size=4>var a = document.getElementById(&quot;a&quot;).value;</font><br>");
document.write("<font color=green size=4>Wytłumaczenie:</font><br>");
document.write("<font color=red size=4>wpisanie do zmiennej &quot;a&quot; wartości z elementu o Id &quot;a&quot; (zbieżność nazw)</font><br><br>");

document.write("<font color=green size=4>Czwarta linia kodu:</font><br>");
document.write("<font color=red size=4>if (a == &quot;&quot; || b == &quot;&quot;)</font><br>");
document.write("<font color=green size=4>Wytłumaczenie:</font><br>");
document.write("<font color=red size=4>sprawdzenie czy pola &quot;a&quot; lub &quot;b&quot; są puste.</font><br><br>");

document.write("<font color=green size=4>Piąta linia kodu:</font><br>");
document.write("<font color=red size=4>document.getElementById(&quot;wynik&quot;).innerHTML = &quot;Wynik działania wynosi: &quot; + suma;</font><br>");
document.write("<font color=green size=4>Wytłumaczenie:</font><br>");
document.write("<font color=red size=4>pobranie wartości Id o nazwie &quot;wynik&quot; i wyprowadzenie w oknie przeglądarki tekstu &quot;Wynik działania wynosi: &quot; oraz wartości zmiennej suma;</font><br><br>");
}
function okno_zamknij()
{ 
window.close() 
} 
</script>
<br><br> <input type="button" value="zamknij okno" onclick="okno_zamknij()"/>

</html>
