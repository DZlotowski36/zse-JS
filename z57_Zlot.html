<html lang="pl">
<head>
<meta charset="UTF-8">
</head>
<body>
<script>
let pocz_zlo;
let tekst_zlo;
let ilosc_zlo;
do {
pocz_zlo = prompt("Podaj wielkość początkową tekstu z przedziału <20,60>:");
pocz_zlo = parseInt(pocz_zlo);
if (pocz_zlo < 20 || pocz_zlo > 60) {
alert("Liczba nie należy do przedziału <20,60>");
}
} while (pocz_zlo < 20 || pocz_zlo > 60);
tekst_zlo = prompt("Podaj dowolny tekst:");
ilosc_zlo = prompt("Ile razy wyświetlić tekst?");
ilosc_zlo = parseInt(ilosc_zlo);
for (let i_zlo = 1; i_zlo <= ilosc_zlo; i_zlo++) {
document.write(
"<p style='font-size:" + pocz_zlo + "px; color:black;'>" 
+ tekst_zlo + "</p>"
);
if (pocz_zlo < 100) {
pocz_zlo = pocz_zlo + 5;
} else {
pocz_zlo = pocz_zlo - 5;
}
}
</script>
</body>
</html>
