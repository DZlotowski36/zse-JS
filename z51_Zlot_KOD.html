<html>
<script type="text/javascript">
function okno_zamknij()
{
window.close() 
}
</script>
<title>Złotowski Z51_KOD</title>
<body bgcolor=#7287d6>
<form>
<textarea name="Złotowski" cols="80" rows="40" readonly> 
<html>
<meta charset="UTF-8">
</head>
<body>
<div style="color:red; font-size:30px;">
<script>
    let n_zlo = prompt("Podaj liczbę n:");
    n_zlo = parseInt(n_zlo);
    let silnia_zlo = 1;
    for (let i_zlo = 1; i_zlo <= n_zlo; i_zlo++) {
        silnia_zlo = silnia_zlo * i_zlo;
    }
    document.write("n = " + n_zlo + "<br>");
    document.write(n_zlo + "! = " + silnia_zlo);
</script>
</div>
</body>
</html>
</textarea>
</form>
<input type="button" value="zamknij okno" onclick="okno_zamknij()"/>
</body>

</html>
