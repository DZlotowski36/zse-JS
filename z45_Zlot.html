<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
</head>
<body>
<body bgcolor=#7287d6>
<script>
let liczba_liter_nazwiska_zło = 9;
let ile_razy_wyswietlic_zło = (liczba_liter_nazwiska_zło % 4) + 10;
let wielkosc_liter_zło = (liczba_liter_nazwiska_zło % 3) + 40;
let dana_zło = prompt("Podaj liczbę:");
dana_zło = parseInt(dana_zło);
document.write("ilość wykonania pętli = " + ile_razy_wyswietlic_zło + "<br>");
document.write("wielkość liter = " + wielkosc_liter_zło + "px<br><br>");
for (let i_z = 1; i_z <= ile_razy_wyswietlic_zło; i_z++) {
if (dana_zło % 2 == 0) 
{
document.write("<span style='color:blue; font-size:" + wielkosc_liter_zło + "px;'>Złotowski</span><br>");
} 
else 
{
document.write("<span style='color:green; font-size:" + wielkosc_liter_zło + "px;'>Dawid</span><br>");
}
}
</script>
</body>
</html>
