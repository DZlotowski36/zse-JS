<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
</head>
<body>
<body bgcolor=#7287d6>
<script>
    let koniec_petli_zlo = prompt("Podaj liczbę końcową:");
    koniec_petli_zlo = parseInt(koniec_petli_zlo);
    for (let i_z = 2; i_z <= koniec_petli_zlo; i_z++) {
        if (i_z % 2 == 0) {
          document.write(i_z + "<br>");
        }
    }
</script>
</body>
</html>
